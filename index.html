<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-venda: Frente a Frente com o Salvador</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-flat: #F2EBE1; 
            --text-dark: #1A1A1A; 
            --text-muted: #5C4F45; 
            
            --gold-accent: #C59B27; 
            --gold-hover: #A47E1B;
            
            --dark-brown: #3E2723;
            --brown-hover: #2A1A17;

            --white: #FFFFFF;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark); 
            background-color: var(--bg-flat); 
        }

        .hero { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            box-sizing: border-box;
        }

        .hero-content { 
            max-width: 1200px; 
            display: flex; 
            align-items: center; 
            gap: 60px; 
            width: 100%; 
        }

        .hero-text { flex: 1; }
        
        .author-name {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .hero-text h1 { 
            font-family: 'Oswald', sans-serif;
            font-size: 4.5rem; 
            line-height: 1; 
            margin-top: 0;
            margin-bottom: 15px; 
            text-transform: uppercase;
            color: var(--text-dark);
        }

        .hero-text h2 {
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text-muted);
            margin-top: 0;
            margin-bottom: 30px;
        }

        .hero-text p { 
            font-size: 1.1rem; 
            color: var(--text-muted); 
            margin-bottom: 40px; 
            line-height: 1.6; 
        }

        .btn-cta { 
            background-color: var(--gold-accent); 
            color: var(--white); 
            padding: 20px 40px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: background 0.3s; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        .btn-cta:hover { 
            background-color: var(--gold-hover); 
        }

        .hero-image { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
        }

        /* SOMBRA REMOVIDA AQUI */
        .hero-image img {
            width: 100%;
            max-width: 450px;
            height: auto;
            border-radius: 2px;
        }

        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(26, 26, 26, 0.85); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
        }

        .modal-content { 
            background: var(--white); 
            padding: 40px; 
            border-radius: 4px; 
            width: 100%; 
            max-width: 500px; 
            position: relative; 
            box-sizing: border-box; 
            animation: modalFadeIn 0.3s ease; 
        }

        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .close-btn { 
            position: absolute; 
            top: 15px; right: 20px; 
            font-size: 28px; font-weight: bold; color: #999; 
            cursor: pointer; line-height: 1; 
        }
        .close-btn:hover { color: var(--text-dark); }

        .modal-content h3 { 
            margin-top: 0; 
            font-size: 1.6rem; 
            text-align: center; 
            color: var(--text-dark); 
            margin-bottom: 25px; 
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }
        
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        .rua-col { flex: 2 !important; }
        .numero-col { flex: 1 !important; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-size: 1rem; 
            box-sizing: border-box; 
            transition: border-color 0.3s; 
            color: var(--text-dark); 
            background-color: #fafafa;
        }
        input:focus { border-color: var(--gold-accent); outline: none; background-color: var(--white); }

        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        
        .btn-submit { 
            flex: 1; padding: 16px 10px; 
            background-color: var(--gold-accent); 
            color: var(--white); 
            border: none; 
            border-radius: 4px; 
            font-size: 1rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.3s; 
            text-transform: uppercase;
        }
        .btn-submit:hover { background-color: var(--gold-hover); }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .btn-dura { background-color: var(--dark-brown); }
        .btn-dura:hover { background-color: var(--brown-hover); }

        @media (max-width: 900px) {
            .hero-content { flex-direction: column; text-align: center; gap: 40px; }
            .hero-text h1 { font-size: 3.5rem; }
            .hero-image img { max-width: 350px; }
        }

        @media (max-width: 480px) {
            .hero-text h1 { font-size: 2.8rem; }
            .btn-group { flex-direction: column; }
            .form-row { flex-direction: column; gap: 0; }
            .modal-content { margin: 20px; padding: 25px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <div class="author-name">Micaías Vieira</div>
                <h1>Frente a Frente<br>com o Salvador</h1>
                <h2>Todo encontro com ELE exige uma resposta</h2>
                <p>Garanta o seu exemplar exclusivo na pré-venda. Preencha seus dados de entrega para escolher a versão de capa e ser direcionado para o pagamento seguro.</p>
                <button class="btn-cta" id="btnAbrirModal">Garantir meu exemplar</button>
            </div>
            <div class="hero-image">
                <img src="cap.png" alt="Capa do Livro Frente a Frente com o Salvador">
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="modalFormulario">
        <div class="modal-content">
            <span class="close-btn" id="btnFecharModal">&times;</span>
            <h3>Dados de Entrega</h3>
            
            <form id="formPreVenda">
                <input type="hidden" id="tipoCapa" name="Tipo de Capa">

                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="Nome" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="Email" required>
                    </div>
                    <div class="form-group">
                        <label for="telefone">WhatsApp</label>
                        <input type="tel" id="telefone" name="WhatsApp" placeholder="(11) 99999-9999" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="CEP" maxlength="9" placeholder="00000-000" onblur="buscaCep()" required>
                </div>

                <div class="form-row">
                    <div class="form-group rua-col">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="Endereço Completo" placeholder="Nome da rua" required>
                    </div>
                    <div class="form-group numero-col">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" name="Número" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" name="Bairro" required>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-submit btn-normal" onclick="escolherCapa('Capa Normal', '/agradecimento-normal.html')">Capa Normal</button>
                    <button type="submit" class="btn-submit btn-dura" onclick="escolherCapa('Capa Dura', '/agradecimento-dura.html')">Capa Dura</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalFormulario');
        const btnAbrir = document.getElementById('btnAbrirModal');
        const btnFechar = document.getElementById('btnFecharModal');
        
        let linkDePagamentoAtual = '';

        function escolherCapa(tipo, link) {
            document.getElementById('tipoCapa').value = tipo;
            linkDePagamentoAtual = link;
        }

        btnAbrir.addEventListener('click', () => { modal.style.display = 'flex'; });
        btnFechar.addEventListener('click', () => { modal.style.display = 'none'; });
        window.addEventListener('click', (event) => { if (event.target === modal) { modal.style.display = 'none'; } });

        function buscaCep() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(resposta => resposta.json())
                    .then(dados => {
                        if (!dados.erro) {
                            document.getElementById('endereco').value = dados.logradouro;
                            document.getElementById('bairro').value = dados.bairro;
                            document.getElementById('numero').focus();
                        }
                    })
                    .catch(erro => console.error('Erro ao buscar CEP:', erro));
            }
        }

        document.getElementById('formPreVenda').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const botoes = document.querySelectorAll('.btn-submit');
            botoes.forEach(btn => btn.disabled = true);
            
            const tipoSelecionado = document.getElementById('tipoCapa').value;
            const botaoAtivo = tipoSelecionado === 'Capa Normal' 
                ? document.querySelector('.btn-normal') 
                : document.querySelector('.btn-dura');
                
            botaoAtivo.innerText = 'Processando...';

            const scriptURL = 'COLE_AQUI_A_URL_DO_APP_DA_WEB';
            
            const formData = new FormData(this);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    window.location.href = linkDePagamentoAtual;
                })
                .catch(error => {
                    console.error('Erro ao enviar!', error.message);
                    alert('Houve um erro de conexão. Tente novamente.');
                    
                    botoes.forEach(btn => btn.disabled = false);
                    document.querySelector('.btn-normal').innerText = 'Capa Normal';
                    document.querySelector('.btn-dura').innerText = 'Capa Dura';
                });
        });
    </script>
</body>
</html>
